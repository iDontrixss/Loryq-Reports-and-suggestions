<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zotlin — Reportes y Sugerencias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0c0a;
      --dark: #111612;
      --card: #151b14;
      --border: #1e2a1c;
      --green: #4ade80;
      --green-dim: #2a7a46;
      --green-bg: rgba(74,222,128,.07);
      --muted: #6b8c6a;
      --light: #d6ead4;
      --white: #f0f7ee;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--light);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .025; pointer-events: none; z-index: 1000;
    }
    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .glow {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(74,222,128,.1) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .logo-wrap { margin-bottom: 20px; }
    .logo {
      width: 64px; height: 64px;
      background: var(--green-bg);
      border: 1px solid rgba(74,222,128,.2);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      color: var(--green);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--green);
      background: var(--green-bg);
      border: 1px solid rgba(74,222,128,.2);
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 20px;
      letter-spacing: .08em;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    h1 em { font-style: normal; color: var(--green); }
    .sub {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color .15s, background .15s, transform .15s;
      text-decoration: none;
      color: inherit;
    }
    .option:hover {
      border-color: rgba(74,222,128,.4);
      background: rgba(74,222,128,.04);
      transform: translateY(-2px);
    }
    .option-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .icon-bug { background: rgba(224,92,92,.1); }
    .icon-suggestion { background: var(--green-bg); }
    .option-text strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 3px;
    }
    .option-text span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .arrow { margin-left: auto; color: var(--muted); font-size: 18px; }
    .footer {
      margin-top: 32px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .06em;
    }
    .footer a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="logo-wrap">
      <div class="logo">Z</div>
    </div>
    <div class="badge">Zotlin Launcher</div>
    <h1>¿Cómo podemos <em>mejorar?</em></h1>
    <p class="sub">Seleccioná el tipo de mensaje que querés enviar al equipo de Zotlin.</p>

    <div class="options">
      <a class="option" href="/report">
        <div class="icon-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-9"/><path d="M14 7a4 4 0 0 1 4 4v3a6 6 0 0 1-12 0v-3a4 4 0 0 1 4-4z"/><path d="M14.12 3.88 16 2"/><path d="M21 21a4 4 0 0 0-3.81-4"/><path d="M21 5a4 4 0 0 1-3.55 3.97"/><path d="M22 13h-4"/><path d="M3 21a4 4 0 0 1 3.81-4"/><path d="M3 5a4 4 0 0 0 3.55 3.97"/><path d="M6 13H2"/><path d="m8 2 1.88 1.88"/><path d="M9 7.13V6a3 3 0 1 1 6 0v1.13"/></svg>
</div>
        <div class="option-text">
          <strong>Reportar un bug</strong>
          <span>Algo no funciona como debería en el launcher.</span>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="option" href="/suggestion">
        <div class="icon-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
</div>
        <div class="option-text">
          <strong>Hacer una sugerencia</strong>
          <span>Tenés una idea para mejorar Zotlin.</span>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="footer">
      Zotlin Launcher · <a href="https://github.com/iDontrixss/ZotlinLauncher" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
