<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportar un problema — Loryq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0a03;
      --bg-2: #141007;
      --surface: rgba(28, 22, 9, .92);
      --surface-2: rgba(38, 30, 12, .82);
      --card: #181207;
      --card-soft: rgba(255,255,255,.035);
      --border: rgba(250, 204, 21, .16);
      --border-strong: rgba(250, 204, 21, .28);
      --accent: #facc15;
      --accent-2: #f59e0b;
      --accent-soft: rgba(250, 204, 21, .10);
      --accent-glow: rgba(250, 204, 21, .18);
      --muted: #b09a55;
      --text: #fff4c2;
      --heading: #fffbe8;
      --danger: #fb7185;
      --danger-soft: rgba(251, 113, 133, .12);
      --danger-border: rgba(251, 113, 133, .28);
      --ok: #22c55e;
      --ok-soft: rgba(34,197,94,.12);
      --ok-border: rgba(34,197,94,.25);
      --warning: #f59e0b;
      --warning-soft: rgba(245,158,11,.12);
      --warning-border: rgba(245,158,11,.26);
      --radius: 18px;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #fffaf0;
      --bg-2: #fff3c8;
      --surface: rgba(255, 255, 255, .88);
      --surface-2: rgba(255, 249, 226, .86);
      --card: #ffffff;
      --card-soft: rgba(245, 158, 11, .055);
      --border: rgba(146, 101, 20, .16);
      --border-strong: rgba(146, 101, 20, .26);
      --accent: #d97706;
      --accent-2: #f59e0b;
      --accent-soft: rgba(245, 158, 11, .12);
      --accent-glow: rgba(245, 158, 11, .22);
      --muted: #8a6a2c;
      --text: #3f2f0c;
      --heading: #191207;
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, .09);
      --danger-border: rgba(220, 38, 38, .22);
      --ok: #15803d;
      --ok-soft: rgba(21,128,61,.09);
      --ok-border: rgba(21,128,61,.22);
      --warning: #b45309;
      --warning-soft: rgba(180,83,9,.09);
      --warning-border: rgba(180,83,9,.22);
      --shadow: 0 24px 70px rgba(120, 80, 10, .12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 20%, var(--accent-glow) 0%, transparent 34rem),
        radial-gradient(circle at 16% 86%, rgba(255,255,255,.045) 0%, transparent 28rem),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      overflow-x: hidden;
      transition: background .35s ease, color .35s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .025;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: screen;
    }

    .orb {
      position: fixed;
      width: min(560px, 85vw);
      aspect-ratio: 1;
      border-radius: 999px;
      background:
        radial-gradient(circle, var(--accent-glow) 0%, transparent 64%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      pointer-events: none;
      filter: blur(4px);
      opacity: .95;
      animation: floatOrb 7s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes floatOrb {
      0%,100% { transform: translate(-50%, -58%) scale(1); }
      50% { transform: translate(-50%, -55%) scale(1.08); }
    }

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 54px;
      height: 34px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: var(--surface);
      color: var(--accent);
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
      z-index: 20;
      transition: border-color .2s ease, transform .2s ease, background .35s ease;
    }
    .theme-toggle:hover { transform: translateY(-1px); border-color: var(--accent); }
    .theme-toggle svg {
      position: absolute;
      width: 17px;
      height: 17px;
      transition: transform .42s cubic-bezier(.2,.8,.2,1), opacity .25s ease;
    }
    .theme-toggle .sun {
      opacity: 0;
      transform: translateY(22px) rotate(-90deg) scale(.7);
    }
    .theme-toggle .moon {
      opacity: 1;
      transform: translateY(0) rotate(0) scale(1);
    }
    html[data-theme="light"] .theme-toggle .sun {
      opacity: 1;
      transform: translateY(0) rotate(0) scale(1);
    }
    html[data-theme="light"] .theme-toggle .moon {
      opacity: 0;
      transform: translateY(-22px) rotate(90deg) scale(.7);
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: enter .55s ease both;
    }

    .container.center { max-width: 500px; text-align: center; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .06em;
      margin-bottom: 28px;
      transition: color .15s, transform .15s;
    }
    .back:hover { color: var(--accent); transform: translateX(-2px); }

    .logo-wrap { margin-bottom: 18px; }
    .logo-card {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(145deg, var(--surface), var(--accent-soft));
      border: 1px solid var(--border-strong);
      box-shadow: 0 18px 55px var(--accent-glow);
      overflow: hidden;
    }
    .logo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .logo-fallback {
      display: none;
      place-items: center;
      width: 100%;
      height: 100%;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--accent);
      font-size: 1.3rem;
      letter-spacing: -.08em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--border-strong);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }

    .header { margin-bottom: 28px; }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--border-strong);
    }

    .icon-wrap.danger {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: var(--danger-border);
    }

    h1 {
      font-size: clamp(1.8rem, 7vw, 2.25rem);
      font-weight: 800;
      color: var(--heading);
      letter-spacing: -.04em;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    h1 em.danger { color: var(--danger); }

    .sub {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.75;
    }

    .card,
    .option {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card {
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, var(--accent-soft), transparent 62%);
      pointer-events: none;
      opacity: .8;
    }

    .card > * { position: relative; z-index: 1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }

    label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .075em;
      text-transform: uppercase;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }

    textarea {
      resize: vertical;
      min-height: 136px;
      line-height: 1.65;
      font-family: var(--sans);
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .danger-page textarea:focus {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px var(--danger-soft);
    }

    input::placeholder,
    textarea::placeholder {
      color: color-mix(in srgb, var(--muted), transparent 42%);
    }

    .char-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: -11px;
    }

    .char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #1a1205;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s, transform .15s, box-shadow .15s;
      letter-spacing: -.01em;
      box-shadow: 0 10px 34px var(--accent-glow);
    }

    .btn.danger {
      background: linear-gradient(135deg, var(--danger), #ef4444);
      color: #fff;
      box-shadow: 0 10px 34px var(--danger-soft);
    }

    .btn:hover { opacity: .92; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .42; cursor: not-allowed; transform: none; box-shadow: none; }

    .msg {
      border-radius: 12px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      display: none;
      line-height: 1.5;
    }
    .msg.ok { background: var(--ok-soft); color: var(--ok); border: 1px solid var(--ok-border); display: block; }
    .msg.error { background: var(--danger-soft); color: var(--danger); border: 1px solid var(--danger-border); display: block; }
    .msg.spam { background: var(--warning-soft); color: var(--warning); border: 1px solid var(--warning-border); display: block; }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      border-radius: 16px;
      padding: 20px 22px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color .18s, transform .18s, background .18s;
    }

    .option::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 0% 0%, var(--accent-soft), transparent 55%);
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }

    .option:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }
    .option:hover::before { opacity: 1; }

    .option .icon-wrap {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .option-text { position: relative; z-index: 1; }
    .option-text strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
      color: var(--heading);
      margin-bottom: 4px;
      letter-spacing: -.02em;
    }
    .option-text span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 18px;
      position: relative;
      z-index: 1;
      transition: color .15s, transform .15s;
    }
    .option:hover .arrow { color: var(--accent); transform: translateX(2px); }

    .mini-note {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .mini-note strong { color: var(--accent); font-weight: 500; }

    .footer {
      margin-top: 26px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .06em;
      text-align: center;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 540px) {
      body { padding: 76px 18px 24px; align-items: flex-start; }
      .theme-toggle { top: 14px; right: 14px; }
      .card { padding: 20px; }
      .option { padding: 18px; }
    }

  </style>
</head>
<body class="danger-page">
  <div class="orb"></div>
  
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Cambiar tema">
    <svg class="moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M20.2 15.7A8.5 8.5 0 0 1 8.3 3.8 8.6 8.6 0 1 0 20.2 15.7Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="sun" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.9"/>
      <path d="M12 2.5v2M12 19.5v2M4.6 4.6 6 6M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4 6 18M18 6l1.4-1.4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
    </svg>
  </button>


  <main class="container">
    <a class="back" href="/">← volver</a>

    <div class="header">
      <div class="icon-wrap danger"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20v-9"/><path d="M14 7a4 4 0 0 1 4 4v3a6 6 0 0 1-12 0v-3a4 4 0 0 1 4-4z"/><path d="M14.12 3.88 16 2"/><path d="M21 21a4 4 0 0 0-3.81-4"/><path d="M21 5a4 4 0 0 1-3.55 3.97"/><path d="M22 13h-4"/><path d="M3 21a4 4 0 0 1 3.81-4"/><path d="M3 5a4 4 0 0 0 3.55 3.97"/><path d="M6 13H2"/><path d="m8 2 1.88 1.88"/><path d="M9 7.13V6a3 3 0 1 1 6 0v1.13"/></svg></div>
      <h1>Algo no<br>está <em class="danger">funcionando</em></h1>
      <p class="sub">Describí el problema con el mayor detalle posible. Cada error reportado hace que Loryq Launcher sea más estable.</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="report-text">Tu reporte</label>
        <textarea id="report-text" placeholder="Ej: Al hacer click en Jugar con la versión 1.21.4 el launcher se cierra sin abrir el juego..." maxlength="1000"></textarea>
        <div class="char-wrap">
          <span class="char-count"><span id="char-count">0</span>/1000</span>
        </div>
      </div>

      <button class="btn danger" id="submit-btn" onclick="submitReport()">Enviar reporte</button>
      <div class="msg" id="msg"></div>
    </div>

    <div class="footer">
      Loryq Launcher · <a href="https://github.com/iDontrixss/ZotlinLauncher" target="_blank" rel="noopener">GitHub</a>
    </div>
  </main>

  <script>
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme)
      localStorage.setItem('loryq-theme', theme)
      const btn = document.getElementById('themeToggle')
      if (btn) {
        btn.setAttribute('aria-label', theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro')
        btn.setAttribute('title', theme === 'dark' ? 'Modo claro' : 'Modo oscuro')
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark'
      applyTheme(current === 'dark' ? 'light' : 'dark')
    }

    ;(() => {
      const saved = localStorage.getItem('loryq-theme')
      const preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
      applyTheme(saved || preferred)
    })()


    const textarea = document.getElementById('report-text')
    const charCount = document.getElementById('char-count')

    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length
    })

    async function submitReport() {
      const text = textarea.value.trim()
      if (text.length < 10) {
        showMsg('Escribí al menos 10 caracteres.', 'error')
        return
      }

      const btn = document.getElementById('submit-btn')
      btn.disabled = true
      btn.textContent = 'Enviando...'
      hideMsg()

      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        })
        const data = await res.json()

        if (data.ok) {
          if (data.tipo === 'basura') {
            showMsg('Tu mensaje fue recibido.', 'spam')
          } else if (data.tipo === 'sugerencia') {
            showMsg('¡Gracias! Tu sugerencia fue registrada.', 'ok')
          } else {
            showMsg('¡Gracias! El bug fue reportado correctamente.', 'ok')
          }
          textarea.value = ''
          charCount.textContent = '0'
        } else {
          showMsg(data.error || 'Error al enviar. Intentá de nuevo.', 'error')
        }
      } catch (err) {
        showMsg('Error de conexión. Intentá de nuevo.', 'error')
      }

      btn.disabled = false
      btn.textContent = 'Enviar reporte'
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = 'msg ' + type
    }

    function hideMsg() {
      const el = document.getElementById('msg')
      el.className = 'msg'
    }
  </script>
</body>
</html>
